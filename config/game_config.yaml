debug_mode: true
display:
  fullscreen: False
  windowed_scale: 3
battle_background:
  base_resolution: [160, 120]
  speed_multiplier: 1.5
action_judge:
  backend: "llm"
  llm:
    model: "llama3.1-8b"
    type: "cerebras"
narrator:
  llm:
    model: "llama3.1-8b"
    type: "cerebras"
enemy_action:
  llm:
    model: "llama3.1-8b"
    type: "cerebras"
enemy_generation:
  llm:
    model: "llama3.1-8b"
    type: "cerebras"
  character_words_path: "src/llm_rpg/assets/word_lists/characters.txt"
  adjective_words_path: "src/llm_rpg/assets/word_lists/adjectives.txt"
  place_words_path: "src/llm_rpg/assets/word_lists/places.txt"
sprite_generator:
  #type: "dummy"
  #latency_seconds: 0.0
  type: "sd"
  base_model: "models/sprite/westernBeautiful_v10.safetensors"
  lora_path: "models/sprite/earthbound_lora.safetensors"
  lcm_lora_path: "models/sprite/LCM_LoRA_Weights_SD15.safetensors"
  trigger_prompt: "Earthbound_enemy, neutral grey background, pixelart, drop shadow"
  prompt_llm:
    model: "llama3.1-8b"
    type: "cerebras"
  prompt_template: |
    Generate Stable Diffusion visual tags describing ONLY the physical appearance of this character.

    Enemy name: {enemy_name}
    Enemy description: {enemy_description}

    Rules:
    - Output only a comma-separated list
    - Use at most 5 tags
    - Tags must describe visible, physical traits only
    - Do NOT include personality, emotions, behavior, or abstract qualities
    - Prefer clothing, armor, body type, age, facial features, and gear
    - Each tag should be usable directly as a Stable Diffusion prompt
    - Describe ONLY the physical appearance of this character.
  guidance_scale: 7
  num_inference_steps: 40
  inference_height: 512
  inference_width: 512
  vae_path: null
  use_lcm: false
  negative_prompt: "ng_deepnegative_v1_75t,"
hero:
  base_hero_stats:
    attack: 5
    defense: 5
    focus: 20
    max_hp: 5
  stats_level_up_amount: 5
  max_items: 3
  classes:
    attack:
      class_name: "Gym Bro"
      description: "Good on the offensive, hits hard but thinks less."
      base_stats:
        attack: 5
        defense: 5
        focus: 10
        max_hp: 10
    focus:
      class_name: "Awkward Poet"
      description: "Is able to deal damage by the sheer force of his words and imagination."
      base_stats:
        attack: 5
        defense: 5
        focus: 10
        max_hp: 10
    defense:
      class_name: "Doomsday Prepper"
      description: "Survivalist focussed on defending himself and negating damage."
      base_stats:
        attack: 5
        defense: 5
        focus: 10
        max_hp: 10
enemy:
  enemy_level_scaling:
    exp_growth_rate: 1.2
    linear_growth_rate: 0.6
    linear_scaling_factor: 0.8
  leveling_stats_probs:
    attacker:
      attack: 0.7
      defense: 0.2
      max_hp: 0.1
    defender:
      attack: 0.1
      defense: 0.7
      max_hp: 0.2
    tank:
      attack: 0.1
      defense: 0.2
      max_hp: 0.7
  stats_level_up_amount: 5
  base_stats:
    attack: 2
    defense: 2
    focus: 10
    max_hp: 5
damage_calculator:
  ad_diff_scaling: 0.5
  ad_parity_dmg: 1.25
  random_factor_max: 1.05
  random_factor_min: 0.95
  llm_dmg_impact: 2
  creativity_bonus_per_new_word: 0.1
  creativity_penalty_per_overused_word: 0.1
  creativity_min_new_words_for_bonus: 2
creativity_tracker:
  word_overuse_threshold: 2
prompts:
  action_judge: |
    Score a battle action's feasibility and potential damage (0–10 each).

    Attacker: {attacker_name} — {attacker_description}
    Defender: {defender_name} — {defender_description}
    {hero_name}'s inventory: {items_hero}

    History:
    {battle_log_string}

    Action: {proposed_action_attacker}

    Scoring rules:
    - Penalize actions using items {hero_name} doesn't have
    - Penalize supernatural moves unless {hero_name}'s description/items support it
    - Penalize repeated actions (check history) and vague actions

    Output JSON.

  action_narration: |
    Describe a battle action in present tense, in one sentence, weaving in the damage dealt.

    Attacker: {attacker_name} — {attacker_description}
    Defender: {defender_name} — {defender_description}
    Action: {proposed_action_attacker}
    Feasibility: {feasibility} | Damage potential: {potential_damage} | Damage dealt: {total_damage}

    One sentence only. Describe the action as it happens, naturally incorporating that {total_damage} damage was dealt (e.g. "...dealing {total_damage} damage"). If infeasible, briefly describe the failed attempt.

  enemy_next_action: |
    You are {self_name} ({self_description}) fighting {hero_name} ({hero_description}).
    Your HP: {self_max_hp} | {hero_name}'s HP: {hero_max_hp}

    History:
    {battle_log_string}

    Choose your next attack. Vary from past actions. Write one brief third-person sentence describing only what you do, not the outcome.

  enemy_generation: |
    You are generating a single enemy for a turn-based RPG battle.
    The enemy must be clearly related to at least one of the following:
    - Adjective: "{enemy_adjective}"
    - Noun: "{enemy_character}"
    - Place/setting: "{enemy_place}"

    Create a coherent, memorable enemy name and a short description:
    Style Guidelines:
      - Fits a quirky SNES-era RPG (EarthBound, Dragon Quest–like)
      - Quirkiness should come from personality, behavior, or theme — not random word combinations
      - Simple and memorable is better than complex and obscure

    Output your answer as JSON.
